<!--
Author: Antonio Corona
Date: 2026-02-20

Base Template

Defines the base HTML layout for the Flask web interface.
All other templates extend this file.

Includes:
- Navigation
- Shared styling
- Flash message display
-->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "Scheduler " }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand"> Maverick Scheduler </div>
    <nav class="nav">
      <a href="/config">Config Editor</a>
      <a href="/run">Generator</a>
      <a href="/viewer">Viewer</a>
      <a href="/ai">AI Chat</a>
    </nav>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="toast-container">
          {% for category, msg in messages %}
            <div class="toast {{ category }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const toasts = document.querySelectorAll(".toast");

    toasts.forEach((toast) => {
      const dismissToast = () => {
        toast.classList.add("fade-out");
        setTimeout(() => toast.remove(), 500);
      };

      setTimeout(dismissToast, 3000);
      toast.addEventListener("click", dismissToast);
    });
  });
  </script>
</body>
</html>
